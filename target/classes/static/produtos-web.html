<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos - Baozi Store</title>
  <link rel="stylesheet" href="/web-style.css">
</head>
<body>
<header class="topbar">
  <div class="brand"><img src="/images/logo.png" class="logo" alt="Logo"><div><h1>Baozi Store</h1><p>Cadastro de Produtos</p></div></div>
  <nav><a href="/">Início</a><a href="/clientes-web">Clientes</a><a href="/produtos-web">Produtos</a><a href="/pedidos-web">Pedidos</a></nav>
</header>
<main class="container">
  <section class="card">
    <h2>Cadastrar / Editar Produto</h2>
    <form id="formProduto" class="form-grid">
      <input type="hidden" id="produtoId">
      <div><label>Nome</label><input id="nome" required value="Baozi Tradicional de Carne Suína"></div>
      <div><label>Preço</label><input id="preco" type="number" step="0.01" required value="12.90"></div>
      <div class="checkbox"><label><input id="estoque" type="checkbox" checked> Produto em estoque</label></div>
      <div class="actions"><button type="submit">Salvar</button><button type="button" class="secondary" onclick="limparFormulario()">Limpar</button></div>
    </form>
  </section>
  <section class="card">
    <div class="section-title"><h2>Lista de Produtos</h2><a href="/produtos" target="_blank">Ver JSON</a></div>
    <table><thead><tr><th>ID</th><th>Nome</th><th>Preço</th><th>Estoque</th><th>Ações</th></tr></thead><tbody id="tabela"></tbody></table>
  </section>
</main>
<footer>Erick Ramon Alves da Silveira e Silva - RU 5021939</footer>
<script src="/produtos-web.js"></script>
</body>
</html>
